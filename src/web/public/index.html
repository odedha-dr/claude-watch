        const bottom = p.y + p.h + padding;
        if (right > maxX) maxX = right;
        if (bottom > maxY) maxY = bottom;
      });

      const svgW = Math.max(maxX, 400);
      const svgH = Math.max(maxY, 300);

      // Build SVG
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;">`;

      // Draw edges first (behind nodes)
      for (const edge of edges) {
        const fp = positions[edge.fromIdx];
        const tp = positions[edge.toIdx];
        const x1 = fp.x;
        const y1 = fp.y + fp.h;
        const x2 = tp.x;
        const y2 = tp.y;
        const midY = (y1 + y2) / 2;
        const edgeClass = tp.node.type === 'agent' ? 'agent' : 'skill';
        svg += `<path class="flow-edge ${edgeClass}" d="M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}" />`;
        if (edge.showLabel) {
          const labelX = (x1 + x2) / 2;
          const labelY = midY - 4;
          svg += `<text class="flow-edge-label" x="${labelX}" y="${labelY}" text-anchor="middle">${escHtml(edge.label)}</text>`;
        }
      }

      // Draw nodes
      positions.forEach((p, idx) => {
        const n = p.node;
        const left = p.x - p.w / 2;
        const top = p.y;
        const nodeClass = n.type || 'session';

        svg += `<g class="flow-node ${nodeClass}" data-flow-idx="${idx}" data-flow-type="${n.type}" data-flow-id="${escHtml(n.id || '')}">`;

        if (n.type === 'skill') {
          // Diamond/hexagon shape for skill
          const cx = p.x;
          const cy = top + p.h / 2;
          const hw = p.w / 2;
          const hh = p.h / 2;
          svg += `<polygon points="${cx},${cy - hh} ${cx + hw},${cy} ${cx},${cy + hh} ${cx - hw},${cy}" />`;
        } else {
          // Rounded rectangle for session and agent
          svg += `<rect x="${left}" y="${top}" width="${p.w}" height="${p.h}" rx="8" ry="8" />`;
        }

        // foreignObject for rich content
        svg += `<foreignObject x="${left}" y="${top}" width="${p.w}" height="${p.h}">`;
        svg += `<div xmlns="http://www.w3.org/1999/xhtml" class="flow-node-content" style="display:flex;flex-direction:column;gap:3px;padding:${n.type === 'skill' ? '8px 16px' : '10px'};height:100%;box-sizing:border-box;overflow:hidden;">`;

        if (n.type === 'session') {
          const label = n.label || 'Session';
          const model = n.model ? shortModel(n.model) : null;
          const totalTok = n.tokens ? (n.tokens.input || 0) + (n.tokens.output || 0) + (n.tokens.cacheCreation || 0) + (n.tokens.cacheRead || 0) : 0;
          svg += `<div class="flow-node-label" title="${escHtml(label)}">${escHtml(label)}</div>`;
          svg += `<div class="flow-node-meta">`;
          if (model) {
            svg += `<span class="flow-badge" style="color:${modelColor(n.model)};border:1px solid ${modelColor(n.model)}">${model}</span>`;
          }
          svg += `</div>`;
          svg += `<div class="flow-node-stats">`;
          if (totalTok) svg += `Tokens: <b>${fmt(totalTok)}</b>`;
          if (n.cost != null) svg += ` &middot; <b>${fmtCost(n.cost)}</b>`;
          if (n.toolCount) svg += `<br/>Tools: <b>${fmt(n.toolCount)}</b>`;
          if (n.durationMs) svg += ` &middot; ${fmtDuration(n.durationMs)}`;
          svg += `</div>`;
        } else if (n.type === 'agent') {
          const label = n.label || 'Agent';
          const model = n.model ? shortModel(n.model) : null;
          svg += `<div class="flow-node-label" title="${escHtml(label)}">${escHtml(label)}</div>`;
          svg += `<div class="flow-node-meta">`;
          if (model) {
            svg += `<span class="flow-badge" style="color:${modelColor(n.model)};border:1px solid ${modelColor(n.model)}">${model}</span>`;
          }
          svg += `Turn #${n.turnNumber}`;
          svg += `</div>`;
          svg += `<div class="flow-node-stats">`;
          if (n.tokens) svg += `In: <b>${fmt(n.tokens.input || 0)}</b> &middot; Out: <b>${fmt(n.tokens.output || 0)}</b>`;
          if (n.cost != null) svg += ` &middot; <b>${fmtCost(n.cost)}</b>`;
          svg += `</div>`;
        } else if (n.type === 'skill') {
          svg += `<div class="flow-node-label" style="text-align:center;font-size:11px;" title="${escHtml(n.label || 'Skill')}">${escHtml(n.label || 'Skill')}</div>`;
          svg += `<div class="flow-node-meta" style="justify-content:center;">Turn #${n.turnNumber}</div>`;
        }

        svg += `</div></foreignObject>`;
        svg += `</g>`;
      });

      svg += '</svg>';

      document.getElementById('tab-flow').innerHTML = `<div class="flow-container">${svg}</div>`;

      // Tooltip element
      let tooltip = document.createElement('div');
      tooltip.className = 'flow-tooltip';
      tooltip.style.display = 'none';
      document.body.appendChild(tooltip);

      // Attach interactivity
      document.querySelectorAll('.flow-node').forEach(nodeEl => {
        const idx = parseInt(nodeEl.dataset.flowIdx);
        const p = positions[idx];
        const n = p.node;

        // Hover tooltip
        nodeEl.addEventListener('mouseenter', (e) => {
          let html = '';
          html += `<div><b>${escHtml(n.label || n.type)}</b></div>`;
          html += `<div>Type: ${n.type}</div>`;
          if (n.model) html += `<div>Model: ${shortModel(n.model)}</div>`;
          html += `<div>Turn: #${n.turnNumber}</div>`;
          if (n.timestamp) html += `<div>Time: ${fmtDate(n.timestamp)}</div>`;
          if (n.tokens) {
            html += `<div>Input: ${fmt(n.tokens.input || 0)} &middot; Output: ${fmt(n.tokens.output || 0)}</div>`;
            if (n.tokens.cacheCreation || n.tokens.cacheRead) {
              html += `<div>Cache W: ${fmt(n.tokens.cacheCreation || 0)} &middot; Cache R: ${fmt(n.tokens.cacheRead || 0)}</div>`;
            }
          }
          if (n.cost != null) html += `<div>Cost: <b>${fmtCost(n.cost)}</b></div>`;
          if (n.toolCount) html += `<div>Tool Calls: ${fmt(n.toolCount)}</div>`;
          if (n.durationMs) html += `<div>Duration: ${fmtDuration(n.durationMs)}</div>`;
          if (n.children && n.children.length > 0) {
            html += `<div>Children: ${n.children.length}</div>`;
          }
          tooltip.innerHTML = html;
          tooltip.style.display = 'block';
        });

        nodeEl.addEventListener('mousemove', (e) => {
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY + 12) + 'px';
        });

        nodeEl.addEventListener('mouseleave', () => {
          tooltip.style.display = 'none';
        });

        // Click navigation
        nodeEl.addEventListener('click', () => {
          if (n.type === 'agent') switchTab('subagents');
          else if (n.type === 'skill') switchTab('skills');
        });
      });

      // Clean up tooltip on tab switch
      const origSwitchTab = switchTab;
      // Note: tooltip cleanup on any re-render
      const flowContainer = document.querySelector('.flow-container');
      if (flowContainer) {
        const observer = new MutationObserver(() => {
          if (tooltip && tooltip.parentNode) {
            tooltip.style.display = 'none';
          }
        });
      }
    }

    // ---- SSE Connection ----
    let sseDetailTimer = null;
    function connectSSE() {
      const evtSource = new EventSource('/api/events');
      evtSource.onmessage = (event) => {
        try {
          allSessions = JSON.parse(event.data);
          // Sort: active first, then by startedAt descending
          allSessions.sort((a, b) => {
            if (a.isActive !== b.isActive) return a.isActive ? -1 : 1;
            const ta = a.startedAt ? new Date(a.startedAt).getTime() : 0;
            const tb = b.startedAt ? new Date(b.startedAt).getTime() : 0;
            return tb - ta;
          });
          updateProjectDropdown();
          renderSidebar();
          // Re-fetch and re-render detail for selected session (debounced)
          if (selectedId) {
            const s = allSessions.find(s => s.id === selectedId);
            if (s) {
              renderHeader();
              clearTimeout(sseDetailTimer);
              sseDetailTimer = setTimeout(() => {
                fetch('/api/sessions/' + encodeURIComponent(selectedId))
                  .then(r => r.ok ? r.json() : null)
                  .then(detail => {
                    if (detail && selectedId === detail.id) {
                      selectedDetail = detail;
                      if (activeTab === 'overview') renderOverview();
                      else if (activeTab === 'turns') renderTurns();
                      else if (activeTab === 'tools') renderTools();
                      else if (activeTab === 'subagents') renderSubagents();
                      else if (activeTab === 'skills') renderSkills();
                      else if (activeTab === 'flow') renderFlow();
                    }
                  })
                  .catch(() => {});
              }, 500);
            }
          }
        } catch (e) {
          console.error('Failed to parse SSE data', e);
        }
      };
      evtSource.onerror = () => {
        console.warn('SSE connection lost, reconnecting...');
        evtSource.close();
        setTimeout(connectSSE, 3000);
      };
    }

    connectSSE();

    // Load initial config (e.g. CLI --filter-project)
    fetch('/api/config').then(r => r.json()).then(cfg => {
      if (cfg.initialProjectFilter) {
        projectFilter = cfg.initialProjectFilter;
        document.getElementById('project-select').value = projectFilter;
        renderSidebar();
      }
    }).catch(() => {});
  </script>
</body>
</html>
