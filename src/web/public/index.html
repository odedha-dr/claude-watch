<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-watch</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-surface: #16213e;
      --bg-hover: #1a2742;
      --bg-selected: #0f3460;
      --text: #e0e0e0;
      --text-muted: #8892a4;
      --accent: #00d2ff;
      --green: #00e676;
      --orange: #ffa726;
      --red: #ef5350;
      --border: #2a3a5c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      padding: 16px;
    }
    h1 { font-size: 18px; color: var(--accent); }
    h2 { font-size: 15px; margin-bottom: 12px; color: var(--text-muted); }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .filter-toggle {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted); cursor: pointer; user-select: none;
    }
    .filter-toggle input { accent-color: var(--accent); cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    th {
      text-align: left; padding: 8px 12px;
      background: var(--bg-surface); color: var(--text-muted);
      border-bottom: 2px solid var(--border); font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    tr.session-row { cursor: pointer; transition: background 0.15s; }
    tr.session-row:hover { background: var(--bg-hover); }
    tr.session-row.selected { background: var(--bg-selected); }
    tr.session-row.inactive { opacity: 0.5; }
    .detail-panel {
      background: var(--bg-surface); border-radius: 8px;
      padding: 20px; border: 1px solid var(--border);
    }
    .detail-grid {
      display: grid; grid-template-columns: 1fr 2fr;
      gap: 20px; margin-bottom: 16px;
    }
    .token-table td { padding: 4px 12px 4px 0; }
    .token-label { color: var(--text-muted); }
    .token-value { text-align: right; font-weight: bold; }
    .bar-chart { display: flex; flex-direction: column; gap: 6px; }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-label { width: 80px; text-align: right; color: var(--text-muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; height: 18px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; min-width: 2px; }
    .bar-count { width: 40px; font-size: 12px; color: var(--text-muted); }
    .meta-row { display: flex; gap: 24px; color: var(--text-muted); font-size: 13px; }
    .meta-row span { color: var(--text); }
    .empty { text-align: center; padding: 40px; color: var(--text-muted); }
    .num { font-variant-numeric: tabular-nums; }
    .folder { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>claude-watch</h1>
      <label class="filter-toggle">
        <input type="checkbox" id="show-inactive"> Show inactive sessions
      </label>
    </div>
    <table>
      <thead>
        <tr>
          <th>Session</th>
          <th>Folder</th>
          <th>Model</th>
          <th>Tokens In</th>
          <th>Tokens Out</th>
          <th>Compactions</th>
        </tr>
      </thead>
      <tbody id="session-table"></tbody>
    </table>

    <div id="detail-panel" class="detail-panel" style="display:none">
      <h2 id="detail-title">Session Details</h2>
      <div class="detail-grid">
        <div>
          <table class="token-table">
            <tr><td class="token-label">Input tokens</td><td class="token-value num" id="d-input">-</td></tr>
            <tr><td class="token-label">Output tokens</td><td class="token-value num" id="d-output">-</td></tr>
            <tr><td class="token-label">Cache created</td><td class="token-value num" id="d-cache-create">-</td></tr>
            <tr><td class="token-label">Cache read</td><td class="token-value num" id="d-cache-read">-</td></tr>
            <tr><td class="token-label" style="border-top:1px solid var(--border);padding-top:4px"><strong>Total</strong></td><td class="token-value num" id="d-total" style="border-top:1px solid var(--border);padding-top:4px">-</td></tr>
          </table>
        </div>
        <div>
          <div class="bar-chart" id="tool-chart"></div>
        </div>
      </div>
      <div class="meta-row">
        <div>Folder: <span id="d-cwd">-</span></div>
        <div>Agent spawns: <span id="d-agents">0</span></div>
        <div>Skills: <span id="d-skills">-</span></div>
        <div>Subagents: <span id="d-subagents">0</span></div>
        <div>Compactions: <span id="d-compactions">0</span></div>
      </div>
    </div>

    <div id="empty-msg" class="empty">Waiting for session data...</div>
  </div>

  <script>
    let allSessions = [];
    let selectedId = null;
    let showInactive = false;

    const checkbox = document.getElementById('show-inactive');
    checkbox.addEventListener('change', () => {
      showInactive = checkbox.checked;
      renderTable();
      renderDetail();
    });

    function fmt(n) {
      return n.toLocaleString();
    }

    function getVisibleSessions() {
      if (showInactive) return allSessions;
      return allSessions.filter(s => s.isActive);
    }

    function renderTable() {
      const tbody = document.getElementById('session-table');
      const empty = document.getElementById('empty-msg');
      const sessions = getVisibleSessions();

      if (sessions.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        empty.textContent = showInactive ? 'No sessions found.' : 'No active sessions. Check "Show inactive sessions" to see all.';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = sessions.map(s => {
        const sel = s.id === selectedId ? ' selected' : '';
        const inactive = !s.isActive ? ' inactive' : '';
        return `<tr class="session-row${sel}${inactive}" data-id="${s.id}">
          <td>${s.id.substring(0, 12)}</td>
          <td class="folder" title="${s.cwd || ''}">${s.cwd ? s.cwd.split('/').slice(-2).join('/') : '-'}</td>
          <td>${s.model || '-'}</td>
          <td class="num">${fmt(s.tokens.input)}</td>
          <td class="num">${fmt(s.tokens.output)}</td>
          <td class="num">${s.compactions}</td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.session-row').forEach(row => {
        row.addEventListener('click', () => {
          selectedId = row.dataset.id;
          renderTable();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const panel = document.getElementById('detail-panel');
      const s = allSessions.find(s => s.id === selectedId);
      if (!s) { panel.style.display = 'none'; return; }
      panel.style.display = 'block';

      document.getElementById('detail-title').textContent = 'Session: ' + s.id.substring(0, 16);
      document.getElementById('d-input').textContent = fmt(s.tokens.input);
      document.getElementById('d-output').textContent = fmt(s.tokens.output);
      document.getElementById('d-cache-create').textContent = fmt(s.tokens.cacheCreation);
      document.getElementById('d-cache-read').textContent = fmt(s.tokens.cacheRead);
      document.getElementById('d-total').textContent = fmt(
        s.tokens.input + s.tokens.output + s.tokens.cacheCreation + s.tokens.cacheRead
      );
      document.getElementById('d-cwd').textContent = s.cwd || '-';
      document.getElementById('d-agents').textContent = s.agentSpawns;
      document.getElementById('d-skills').textContent = s.skillInvocations.length > 0
        ? s.skillInvocations.join(', ') : '-';
      document.getElementById('d-subagents').textContent = s.subagents.length;
      document.getElementById('d-compactions').textContent = s.compactions;

      // Tool call bar chart
      const chart = document.getElementById('tool-chart');
      const entries = Object.entries(s.toolCalls).sort((a, b) => b[1] - a[1]);
      const max = entries.length > 0 ? entries[0][1] : 1;
      chart.innerHTML = entries.slice(0, 10).map(([name, count]) => {
        const pct = (count / max * 100).toFixed(1);
        return `<div class="bar-row">
          <div class="bar-label" title="${name}">${name}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="bar-count">${count}</div>
        </div>`;
      }).join('');
    }

    // SSE connection
    const evtSource = new EventSource('/api/events');
    evtSource.onmessage = (event) => {
      allSessions = JSON.parse(event.data);
      const visible = getVisibleSessions();
      if (!selectedId && visible.length > 0) {
        selectedId = visible[0].id;
      }
      renderTable();
      renderDetail();
    };

    evtSource.onerror = () => {
      console.warn('SSE connection lost, will reconnect...');
    };
  </script>
</body>
</html>
